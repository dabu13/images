name: Build and push images to ACR

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      api_image: ${{ steps.image_tags.outputs.api_image }}
      ui_image: ${{ steps.image_tags.outputs.ui_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v4
        with:
          context: ./microservices-sample/api
          push: true
          tags: ${{ secrets.ACR_REGISTRY }}/sample-api:${{ github.sha }}

      - name: Build and push UI image
        uses: docker/build-push-action@v4
        with:
          context: ./microservices-sample/ui
          push: true
          tags: ${{ secrets.ACR_REGISTRY }}/sample-ui:${{ github.sha }}

      - name: Write image tags
        id: image_tags
        run: |
          echo "api_image=${{ secrets.ACR_REGISTRY }}/sample-api:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "ui_image=${{ secrets.ACR_REGISTRY }}/sample-ui:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy-to-aks:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ vars.DEPLOYMENT_ENVIRONMENT || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure CLI login
        run: |
          az login --service-principal -u "${{ secrets.AZURE_CLIENT_ID }}" \
            -p "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME || 'cloudsecuritytest-dns-z9v5dm98.hcp.eastus.azmk8s.io' }}

      - name: Deploy Helm chart to AKS
        run: |
          set -e
          helm upgrade --install sample-app ./microservices-sample/helm/sample-app \
            --namespace sample-app \
            --create-namespace \
            --set image.api=${{ needs.build-and-push.outputs.api_image }} \
            --set image.ui=${{ needs.build-and-push.outputs.ui_image }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/sample-api -n sample-app --timeout=300s
          kubectl rollout status deployment/sample-ui -n sample-app --timeout=300s
