name: Build and push images to ACR

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      api_image: ${{ steps.image_tags.outputs.api_image }}
      ui_image: ${{ steps.image_tags.outputs.ui_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate ACR secrets
        run: |
          set -e
          if [ -z "${{ secrets.ACR_REGISTRY }}" ]; then
            echo "ERROR: ACR_REGISTRY secret is required." >&2
            exit 1
          fi
          if [ -z "${{ secrets.ACR_USERNAME }}" ]; then
            echo "ERROR: ACR_USERNAME secret is required." >&2
            exit 1
          fi
          if [ -z "${{ secrets.ACR_PASSWORD }}" ]; then
            echo "ERROR: ACR_PASSWORD secret is required." >&2
            exit 1
          fi

      - name: Login to ACR
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v4
        with:
          context: ./microservices-sample/api
          push: true
          tags: ${{ secrets.ACR_REGISTRY }}/sample-api:${{ github.sha }}

      - name: Build and push UI image
        uses: docker/build-push-action@v4
        with:
          context: ./microservices-sample/ui
          push: true
          tags: ${{ secrets.ACR_REGISTRY }}/sample-ui:${{ github.sha }}

      - name: Write image tags
        id: image_tags
        run: |
          echo "api_image=${{ secrets.ACR_REGISTRY }}/sample-api:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "ui_image=${{ secrets.ACR_REGISTRY }}/sample-ui:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy-to-aks:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ vars.DEPLOYMENT_ENVIRONMENT || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure CLI login
        run: |
          set -e
          az login --service-principal -u "${{ secrets.AZURE_CLIENT_ID }}" \
            -p "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Validate AKS settings
        run: |
          set -e
          if [ -z "${{ secrets.AKS_CLUSTER_NAME }}" ]; then
            echo "ERROR: AKS_CLUSTER_NAME secret is required." >&2
            exit 1
          fi
          if [ -z "${{ secrets.AKS_RESOURCE_GROUP }}" ]; then
            echo "ERROR: AKS_RESOURCE_GROUP secret is required." >&2
            exit 1
          fi

      - name: Install AKS credential tools
        run: |
          set -e
          az aks install-cli
          mkdir -p $HOME/.azure-kubectl
          export PATH="$HOME/.azure-kubectl:$PATH"
          if ! command -v kubelogin >/dev/null 2>&1; then
            echo "Installing kubelogin"
            curl -L https://github.com/Azure/kubelogin/releases/download/v0.2.19/kubelogin.zip -o kubelogin.zip
            unzip -q kubelogin.zip
            chmod +x ./bin/linux_amd64/kubelogin
            mkdir -p $HOME/.azure-kubelogin
            mv ./bin/linux_amd64/kubelogin $HOME/.azure-kubelogin/
          fi
          export PATH="$HOME/.azure-kubectl:$HOME/.azure-kubelogin:$PATH"
          kubelogin --version
          kubectl version --client

      - name: Set AKS context
        run: |
          set -e
          CLUSTER_NAME="${{ secrets.AKS_CLUSTER_NAME }}"
          RG="${{ secrets.AKS_RESOURCE_GROUP }}"
          echo "Using cluster: $CLUSTER_NAME"
          echo "Using resource group: $RG"
          az aks get-credentials --resource-group "$RG" --name "$CLUSTER_NAME" --admin --overwrite-existing

      - name: Deploy Kubernetes manifests to AKS
        env:
          API_IMAGE: ${{ needs.build-and-push.outputs.api_image }}
          UI_IMAGE: ${{ needs.build-and-push.outputs.ui_image }}
        run: |
          set -e
          set -x
          echo "API_IMAGE=${API_IMAGE}"
          echo "UI_IMAGE=${UI_IMAGE}"
          if [ -z "$API_IMAGE" ]; then
            echo "ERROR: API_IMAGE is empty" >&2
            exit 1
          fi
          if [ -z "$UI_IMAGE" ]; then
            echo "ERROR: UI_IMAGE is empty" >&2
            exit 1
          fi
          sed -i "s|REPLACE_WITH_ACR/sample-api:latest|$API_IMAGE|g" ./microservices-sample/k8s/api-deployment.yaml
          sed -i "s|REPLACE_WITH_ACR/sample-ui:latest|$UI_IMAGE|g" ./microservices-sample/k8s/ui-deployment.yaml
          grep -n 'image:' ./microservices-sample/k8s/api-deployment.yaml ./microservices-sample/k8s/ui-deployment.yaml
          kubectl create namespace sample-app --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f ./microservices-sample/k8s

      - name: Cleanup on failed deployment
        if: failure()
        run: |
          set -e
          echo "Deployment failed; cleaning up Kubernetes objects."
          kubectl delete deployment sample-api sample-ui postgres -n sample-app --ignore-not-found || true
          kubectl delete svc sample-api sample-ui -n sample-app --ignore-not-found || true
          kubectl delete ingress sample-ingress -n sample-app --ignore-not-found || true
          kubectl delete pvc postgres-pvc -n sample-app --ignore-not-found || true
          kubectl delete namespace sample-app --ignore-not-found || true
          exit 1

      - name: Wait for rollout
        if: success()
        run: |
          kubectl rollout status deployment/sample-api -n sample-app --timeout=300s
          kubectl rollout status deployment/sample-ui -n sample-app --timeout=300s
