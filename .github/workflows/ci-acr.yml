name: Build and push images to ACR

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      api_image: ${{ steps.image_tags.outputs.api_image }}
      ui_image: ${{ steps.image_tags.outputs.ui_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Login to ACR using Azure session
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_REGISTRY }}

      - name: Build and push API image
        uses: docker/build-push-action@v4
        with:
          context: ./microservices-sample/api
          push: true
          tags: ${{ secrets.ACR_REGISTRY }}/sample-api:${{ github.sha }}

      - name: Build and push UI image
        uses: docker/build-push-action@v4
        with:
          context: ./microservices-sample/ui
          push: true
          tags: ${{ secrets.ACR_REGISTRY }}/sample-ui:${{ github.sha }}

      - name: Write image tags
        id: image_tags
        run: |
          echo "api_image=${{ secrets.ACR_REGISTRY }}/sample-api:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "ui_image=${{ secrets.ACR_REGISTRY }}/sample-ui:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy-to-aks:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ vars.DEPLOYMENT_ENVIRONMENT || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME || 'cloudsecuritytest-dns-z9v5dm98.hcp.eastus.azmk8s.io' }}

      - name: Deploy manifests to AKS
        run: |
          set -e
          echo "Using API image: ${{ needs.build-and-push.outputs.api_image }}"
          echo "Using UI image: ${{ needs.build-and-push.outputs.ui_image }}"

          sed -i "s|REPLACE_WITH_ACR/sample-api:latest|${{ needs.build-and-push.outputs.api_image }}|g" ./microservices-sample/k8s/api-deployment.yaml
          sed -i "s|REPLACE_WITH_ACR/sample-ui:latest|${{ needs.build-and-push.outputs.ui_image }}|g" ./microservices-sample/k8s/ui-deployment.yaml

          kubectl create namespace sample-app --dry-run=client -o yaml | kubectl apply -f -
          find ./microservices-sample/k8s -maxdepth 1 -name '*.yaml' ! -name 'ingress.yaml' -print0 | xargs -0 kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/sample-api -n sample-app --timeout=300s
          kubectl rollout status deployment/sample-ui -n sample-app --timeout=300s
