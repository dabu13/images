<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sample UI</title>
    <style>body{font-family:Arial,Helvetica,sans-serif;max-width:780px;margin:40px auto;padding:0 16px}</style>
  </head>
  <body>
    <h1>Sample Microservices UI</h1>
    <p>Status: <span id="status">loading...</span></p>
    <h2>Tasks</h2>
    <ul id="tasks"></ul>
    <form id="taskForm">
      <input id="taskInput" placeholder="New task" />
      <button>Add</button>
    </form>

    <script>
      async function load() {
        try {
          const res = await fetch('/api/health');
          const j = await res.json();
          document.getElementById('status').textContent = j.status || 'unknown';

          const r2 = await fetch('/api/tasks');
          const tasks = await r2.json();
          const ul = document.getElementById('tasks');
          ul.innerHTML = '';
          tasks.forEach(t => { const li = document.createElement('li'); li.textContent = t.title; ul.appendChild(li); });
        } catch (err) {
          document.getElementById('status').textContent = 'unavailable';
        }
      }
      document.getElementById('taskForm').addEventListener('submit', async e => {
        e.preventDefault();
        const v = document.getElementById('taskInput').value.trim();
        if (!v) return;
        await fetch('/api/tasks', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:v})});
        document.getElementById('taskInput').value = '';
        load();
      });
      load();
    </script>
  </body>
</html>
