apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-ingress
  namespace: sample-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
  - http:
      paths:
      - path: /api(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: sample-api
            port:
              number: 3000
      - path: /(.*)
        pathType: Prefix
        backend:
          service:
            name: sample-ui
            port:
              number: 80
