apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-ingress
  namespace: {{ .Values.namespace }}
  annotations:
{{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
{{- end }}
spec:
  rules:
  - http:
      paths:
      - path: {{ .Values.ingress.rules._api.path }}
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.ingress.rules._api.serviceName }}
            port:
              number: {{ .Values.ingress.rules._api.servicePort }}
      - path: {{ .Values.ingress.rules._ui.path }}
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.ingress.rules._ui.serviceName }}
            port:
              number: {{ .Values.ingress.rules._ui.servicePort }}
